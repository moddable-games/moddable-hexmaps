<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Generate — Moddable Hexmaps</title>
    <meta name="description" content="Generate randomised hex maps for Nukes, Talisman, and Twilight Imperium. Seeded RNG, editable, exportable.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Moddable Hexmaps">
    <meta property="og:title" content="Generate — Moddable Hexmaps">
    <meta property="og:description" content="Generate randomised hex maps for Nukes, Talisman, and Twilight Imperium.">
    <meta property="og:url" content="https://hex.moddable.games/generate/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Generate — Moddable Hexmaps">
    <meta name="twitter:description" content="Generate randomised hex maps for Nukes, Talisman, and Twilight Imperium.">
    <meta property="og:image" content="https://hex.moddable.games/assets/og-image.png?v=0.4.9">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:image" content="https://hex.moddable.games/assets/og-image.png?v=0.4.9">
    <link rel="icon" href="../assets/cube.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../css/variables.css?v=0.4.9">
    <link rel="stylesheet" href="../css/shared.css?v=0.4.9">
    <link rel="stylesheet" href="../css/style.css?v=0.4.9">
</head>
<body>

<nav class="site-nav">
    <a href="../" class="site-nav__brand">
        <img src="../assets/cube.svg" class="site-nav__cube" alt="">
        <span class="site-nav__wordmark">Moddable Hexmaps</span>
    </a>
    <div class="site-nav__links">
        <a href="./" class="active">Generate</a>
        <a href="../docs/">Docs</a>
        <a href="../docs/api.html">API</a>
        <a href="../docs/guide.html">Guide</a>
        <a href="https://github.com/Moddable-Games/moddable-hexmaps" target="_blank" rel="noopener">GitHub</a>
    </div>
</nav>

<div class="main-content">
    <div class="canvas-area">
        <div class="game-tabs-bar" id="game-tabs"></div>
        <div class="canvas-wrap">
            <canvas id="hex-canvas"></canvas>
        </div>
        <div class="canvas-footer">
            <span id="hex-info">Hover over a hex</span>
            <span id="map-info"></span>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="random">Random</button>
            <button class="sidebar-tab" data-tab="editor">Editor</button>
            <button class="sidebar-tab" data-tab="data">Data</button>
        </div>

        <div class="sidebar-panel active" id="panel-random">
            <div class="control-group" id="size-group">
                <label>Map Size</label>
                <select id="size-select"></select>
            </div>

            <div class="control-group" id="layout-group">
                <label>Layout</label>
                <select id="layout-select"></select>
            </div>

            <div class="control-group" id="style-group">
                <label>Style</label>
                <select id="style-select">
                    <option value="artistic">Artistic</option>
                    <option value="classic">Classic</option>
                </select>
            </div>

            <div class="control-group" id="players-group">
                <label>Players</label>
                <select id="players-select">
                    <option value="0">No bases</option>
                </select>
            </div>

            <div class="control-group">
                <label>Seed</label>
                <input type="number" id="seed-input" placeholder="Random seed...">
            </div>

            <button class="btn" id="random-btn">Randomise</button>
        </div>

        <div class="sidebar-panel" id="panel-editor">
            <div id="editor-content">
                <p class="editor-hint">Click any hex to cycle terrain.</p>
                <div id="ring-resets"></div>
            </div>
        </div>

        <div class="sidebar-panel" id="panel-data">
            <div class="control-group">
                <label>Export</label>
                <textarea id="export-data" readonly placeholder="Click Export to generate JSON..."></textarea>
                <button class="btn btn-outline" id="export-btn">Export JSON</button>
            </div>

            <div class="control-group">
                <label>Import</label>
                <textarea id="import-data" placeholder="Paste JSON map data here..."></textarea>
                <button class="btn" id="import-btn">Import</button>
            </div>

            <button class="btn btn-outline" id="copy-btn">Copy to Clipboard</button>
        </div>
    </aside>
</div>

<footer class="site-footer">
    <a href="https://web.moddable.games/engines/" target="_blank" rel="noopener"><img src="../assets/moddable-logo-white.png" alt="Moddable Games" class="site-footer__logo"></a>
    <p>MIT License · <a href="https://github.com/Moddable-Games/moddable-hexmaps" target="_blank" rel="noopener">GitHub</a> · v0.4.9</p>
</footer>

<script src="../js/xorshift.js?v=0.4.9"></script>
<script src="../js/hex-math.js?v=0.4.9"></script>
<script src="../js/hex-renderer.js?v=0.4.9"></script>
<script src="../data/nukes-hexes.js?v=0.4.9"></script>
<script src="../data/twilight-tiles.js?v=0.4.9"></script>
<script src="../data/twilight-images.js?v=0.4.9"></script>
<script src="../js/game-registry.js?v=0.4.9"></script>
<script src="../js/games/nukes.js?v=0.4.9"></script>
<script src="../js/games/talisman.js?v=0.4.9"></script>
<script src="../js/games/twilight.js?v=0.4.9"></script>
<script src="../js/games/colony.js?v=0.4.9"></script>
<script src="../js/app.js?v=0.4.9"></script>

</body>
</html>
